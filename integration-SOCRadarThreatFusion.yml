defaultclassifier: "null"
description: Enrich indicators by obtaining enhanced information and reputation via
  ThreatFusion of SOCRadar.
detaileddescription: "### Partner Contributed Integration\n#### Integration Author:
  SOCRadar Cyber Intelligence Inc.\nSupport and maintenance for this integration are
  provided by the author. Please use the following contact details:\n- **Email**:
  [xsoar@socradar.io](mailto:xsoar@socradar.io)\n- **URL**: [www.socradar.io](www.socradar.io)\n***\n##
  SOCRadar ThreatFusion\nUse the SOCRadar ThreatFusion integration to enrich indicators
  (ip, domain, hash) by obtaining enhanced information and reputation via SOCRadar.\n***\n###
  How to obtain an API key\n\nTo obtain your SOCRadar ThreatFusion API key please
  contact with the SOCRadar operation team via **operation@socradar.io** \n\nAfter
  obtaining the SOCRadar ThreatFusion API key insert it into **API Key** field and
  start using the SOCRadar ThreatFusion integration by creating the instance.\n\n###
  Further Information\n\nFor further information please see [SOCRadar ThreatFusion
  API](https://platform.socradar.com/docs/api/threat_analyze_api/) documentation.\n\n---\n[View
  Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/soc-radar-threat-fusion)"
display: SOCRadar ThreatFusion (Partner Contribution)
