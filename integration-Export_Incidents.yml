      required: true
    name: xsoar-export-incidents
  dockerimage: demisto/python3:3.12.8.3296088
  runonce: false
  script: |-
    import urllib3
    import requests
    import pandas as pd
    from io import StringIO
    from datetime import datetime

    from CommonServerPython import *
    from CommonServerUserPython import *

    urllib3.disable_warnings()

    # =========================================
    # CLIENT
    # =========================================

    class Client(BaseClient):

        def export_incidents(
            self,
            start_time,
            end_time,
            page_size=500
        ):

            start_dt = datetime.strptime(start_time, "%Y-%m-%d %H:%M:%S")
            end_dt = datetime.strptime(end_time, "%Y-%m-%d %H:%M:%S")

            from_date = start_dt.isoformat() + "Z"
            to_date = end_dt.isoformat() + "Z"

            all_incidents = []
            page = 0

            while True:

                payload = {
                    "filter": {
                        "fromDate": from_date,
                        "toDate": to_date,
                        "page": page,
                        "size": page_size,

                        "fields": [
                            "id",
                            "name",
                            "type",
                            "severity",
                            "status",
                            "owner",
                            "created",
                            "modified",
                            "closed",
                            "playbookId",
                            "playbookName",
                            "investigationId"
                        ],

                        "sort": [
                            {
                                "field": "created",
                                "asc": True
                            }
                        ]
                    }
                }

                demisto.info(f"Fetching page {page}")

                response = self._http_request(
                    method="POST",
                    url_suffix="/incidents/search",
                    json_data=payload,
                    resp_type="json"
                )

                incidents = response.get("data", [])

                if not incidents:
                    break

                demisto.info(f"Retrieved {len(incidents)} incidents")

                for inc in incidents:

                    playbook_name = (
                        inc.get("playbookName")
                        or inc.get("playbook")
                        or inc.get("playbookId")
                    )

                    all_incidents.append({
                        "id": inc.get("id"),
                        "name": inc.get("name"),
                        "type": inc.get("type"),
                        "severity": inc.get("severity"),
                        "status": inc.get("status"),
                        "owner": inc.get("owner"),
                        "playbook": playbook_name,
                        "playbookId": inc.get("playbookId"),
                        "investigationId": inc.get("investigationId"),
                        "created": inc.get("created"),
                        "modified": inc.get("modified"),
                        "closed": inc.get("closed")
                    })

                page += 1

            return all_incidents


    # =========================================
    # COMMAND
    # =========================================

    def export_incidents_command(client, args):

        start_time = args.get("start_time")
        end_time = args.get("end_time")
        page_size = int(args.get("page_size", 500))

        if not start_time:
            raise DemistoException("start_time is required")

        if not end_time:
            raise DemistoException("end_time is required")

        incidents = client.export_incidents(
            start_time=start_time,
            end_time=end_time,
            page_size=page_size
        )

        if not incidents:
            return CommandResults(
                readable_output="No incidents found."
            )

        df = pd.DataFrame(incidents)

        filename = (
            f"xsoar_incidents_"
            f"{start_time[:10].replace('-', '')}"
            f"_to_"
            f"{end_time[:10].replace('-', '')}.csv"
        )

        csv_buffer = StringIO()
        df.to_csv(csv_buffer, index=False)

        readable_output = tableToMarkdown(
            "Incident Export Summary",
            [
                {
                    "Start Time": start_time,
                    "End Time": end_time,
                    "Total Incidents": len(df)
                }
            ]
        )

        return [
            CommandResults(
                readable_output=readable_output,
                outputs_prefix="XSOAR.Export",
                outputs={
                    "TotalIncidents": len(df),
                    "FileName": filename
                }
            ),
            fileResult(
                filename,
                csv_buffer.getvalue()
            )
        ]


    # =========================================
    # TEST MODULE
    # =========================================

    def test_module(client):

        payload = {
            "size": 1
        }

        client._http_request(
            method="POST",
            url_suffix="/incidents/search",
            json_data=payload,
            resp_type="json"
        )

        return "ok"


    # =========================================
    # MAIN
    # =========================================

    def main():

        params = demisto.params()

        base_url = params.get("url", "").rstrip("/")
        verify = not params.get("insecure", False)
        proxy = params.get("proxy", False)

        api_key = params.get("apikey")

        headers = {
            "Authorization": api_key,
            "Accept": "application/json",
            "Content-Type": "application/json"
        }

        client = Client(
            base_url=base_url,
            verify=verify,
            proxy=proxy,
            headers=headers
        )

        command = demisto.command()

        demisto.info(f"Command being called is {command}")

        try:

            if command == "test-module":
                results = test_module(client)
                return_results(results)

            elif command == "xsoar-export-incidents":
                results = export_incidents_command(client, demisto.args())
                return_results(results)

            else:
                raise NotImplementedError(f"Command {command} is not implemented.")

        except Exception as e:
            return_error(
                f"Failed to execute command.\nError:\n{str(e)}"
            )


    if __name__ in ("__main__", "__builtin__", "builtins"):
        main()
  subtype: python3
  type: python
