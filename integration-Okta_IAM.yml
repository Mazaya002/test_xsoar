                        elif isinstance(attr_value, list):
                            if not attr_value:
                                continue
                            attr_value = next(
                                (email.get("value") for email in attr_value if email.get("primary", False)),
                                attr_value[0].get("value", ""),
                            )
                    return iam_attr, attr_value

            raise DemistoException(
                "Your user profile argument must contain at least one attribute that is mapped into one"
                f" of the following attributes in the outgoing mapper: {iam_attrs}"
