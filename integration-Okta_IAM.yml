defaultmapperin: Okta IAM - App Sync (mapper)
description: Integrate with Okta's Identity Access Management service to execute CRUD
  operations to employee lifecycle processes.
detaileddescription: "## Get Your Okta API Token\n\nIn order to use this integration,
  you need to enter your Okta API token in the **API Token** integration instance
  parameter. For information on getting your Okta API token, see the [Okta documentation](https://developer.okta.com/docs/api/getting_started/getting_a_token).\n\n##
  Enable/Disable CRUD Commands\nYou can select which CRUD commands are enabled in
  the integration instance configuration settings. By default, all commands are enabled.\n\n##
  Add Custom Indicator Fields\nFollow these steps to add custom fields to the User
  Profile indicator.\n\n1. In XSOAR, create the custom indicator and incident field,
  for example, **Middle Name**.\n2. Duplicate the **User Profile - Okta (Incoming)**
  mapper and/or the **User Profile - Okta (Outging)** mapper.\n3. Add and map the
  custom field to the necessary mapper(s).\n4. Go to the Okta IAM integration instance
  and in the mapper textbox, replace the name of the default mapper with the custom
  mapper you created.\n\n## Automatically create user if not found in update command\nThe
  *create-if-not-exists* parameter specifies if a new user should be created when
  the User Profile passed was not found in the 3rd-party integration.\n\n## Fetch
  incidents using an \"IAM - Configuration\" incident\nWhen the \"Query only application
  events configured in IAM Configuration\" checkbox is selected, add or remove event
  types for the applications you configured in the **IAM Configuration** incident
  are retrieved.  You must have at least one application configured in XSOAR to fetch
  incidents from Okta.\n\n## Fetch incidents using a manual query filter expression\n**Note:
  Cortex XSOAR recommends you use the Query only application events configured in
  IAM Configuration option to generate the fetch-incidents query filter. The following
  following method should be used primarily for debugging purposes.**\nClear the \"Query
  only application events configured in IAM Configuration\" checkbox to use a custom
  fetch query filter expression. The expression must be in SCIM syntax, and include
  the add and remove event types, as well as the application ID. \nFor example: `(eventType
  eq \"application.user_membership.add\" or eventType eq \"application.user_membership.remove\")
  and target.id eq \"0oar418fvkm67MWGd0h7\"`\nYou may also use the advanced search
  in Okta's System Logs to generate the filter expression.\nFor more details, visit
  [Okta API reference](https://developer.okta.com/docs/reference/api/system-log/#expression-filter).\n\n\n---\n[View
  Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/okta-iam)"
