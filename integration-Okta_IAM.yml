            if incident_type not in [
                IAMUserProfile.CREATE_INCIDENT_TYPE,
                IAMUserProfile.UPDATE_INCIDENT_TYPE,
                IAMUserProfile.DISABLE_INCIDENT_TYPE,
                IAMUserProfile.ENABLE_INCIDENT_TYPE,
