description: The Entra ID Users integration (formerly Azure Active Directory Users)
  is a Unified gateway to security insights - all from a unified Microsoft Graph User
  API.
detaileddescription: "To use this integration, you need to configure authentication.
  There are three authentication methods available:  \n- Cortex XSOAR Azure app \n-
  Self-Deployed Azure app  \n- Azure Managed Identities Authentication\n\nNote: Depending
  on the authentication method that you use, the integration parameters might change.\n\n####
  Cortex XSOAR Azure App\nYou need to grant Cortex XSOAR authorization to access Entra
  ID Users.\n\n1. Access the [authorization flow](https://oproxy.demisto.ninja/ms-graph-user).\n2.
  Click the **Start Authorization Process** button and you will be prompted to grant
  Cortex XSOAR permissions for your Entra ID Users.\n3. Click the **Accept** button
  and you will receive your ID, token, and key. You will need to enter these when
  you configure the Entra ID Users integration instance in Cortex XSOAR.\n\n#### Self-Deployed
  Azure App\n\nThere are two different authentication methods for self-deployed configuration:
  \n- [Client Credentials flow](https://xsoar.pan.dev/docs/reference/articles/microsoft-integrations---authentication#client-credentials-flow)\n-
  [Authorization Code flow](https://xsoar.pan.dev/docs/reference/articles/microsoft-integrations---authentication#authorization-code-flow)\n\nWe
  recommend using the Client Credentials flow.\n\nIn order to use the ***msgraph-user-change-password***
  command, you must use with the Authorization Code flow.\n\n**Note:** When using
  the Authorization Code flow, make sure the user you authenticate with has the relevant
  roles in Azure AD in order to execute the operation.\n\n\n\n#### Azure Managed Identities
  Authentication\n___\n##### Note: This option is relevant only if the integration
  is running on Azure VM.\nFollow one of these steps for authentication based on Azure
  Managed Identities:\n\n- ##### To use System Assigned Managed Identity\n   - Select
  the **Use Azure Managed Identities** checkbox and leave the **Azure Managed Identities
  Client ID** field empty.\n\n- ##### To use User Assigned Managed Identity\n   1.
  Go to [Azure Portal](https://portal.azure.com/) -> **Managed Identities**.\n   2.
  Select your User Assigned Managed Identity -> copy the Client ID -> paste it in
  the **Azure Managed Identities Client ID** field in the instance settings.\n   3.
  Select the **Use Azure Managed Identities** checkbox.\n\nFor information, see [Managed
  identities for Azure resources](https://learn.microsoft.com/en-us/azure/active-directory/managed-identities-azure-resources/overview).\n\n---\n[View
  Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/microsoft-graph-user)"
