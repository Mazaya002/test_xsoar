description: Integration with Okta's cloud-based identity management service.
detaileddescription: "## Authentication using API Token\nOkta API tokens are used
  to authenticate requests to Okta APIs. \n\n### Prerequisites\n1. Sign in to your
  Okta organization as a user **with administrator privileges**.\n2. In the Admin
  Console, select **Security** > **API** from the menu, and then select the **Tokens**
  tab.\n3. Click **Create Token**.\n4. Name your token and click **Create Token**.\n\n####
  Notes\n- API tokens have the same permissions as the user who creates them, and
  if the permissions of a user change, so do the permissions of the API token.\n\nFor
  more information, see the '[Create an API token](https://developer.okta.com/docs/guides/create-an-api-token/main/)'
  official documentation article.\n\n## Authentication using OAuth 2.0 Authentication\nAs
  an alternative to Okta API tokens, you can interact with Okta APIs using scoped
  OAuth 2.0 access tokens for a number of Okta endpoints.  \nEach access token enables
  the bearer to perform specific actions on specific Okta endpoints, with that ability
  controlled by which scopes the access token contains.\n\n### Required Scopes\nThe
  following scopes are required for the Okta v2 integration to work properly:\n- okta.apps.manage
  \n- okta.apps.read \n- okta.groups.manage \n- okta.groups.read \n- okta.logs.read
  \n- okta.networkZones.manage \n- okta.networkZones.read \n- okta.sessions.manage
  \n- okta.sessions.read \n- okta.users.manage \n- okta.users.read \n\n\n### Prerequisites\n1.
  Sign in to Okta Admin Console.\n2. In the Admin Console, go to **Applications**
  > **Applications**.\n3. Click **Create App Integration**.\n4. Select **API Services**
  as the sign-in method, and click **Next**.\n5. Enter the desired name for the created
  app (e.g., \"Cortex XSOAR\"), and click **Save**.\n6. In the app configuration page,
  under the **General** tab and the **Client Credentials** section, select **Public
  key / Private key** for the **Client authentication** option.\n7. Under the newly
  added **PUBLIC KEYS** section, click **Add Key**.\n8. In the **Add Public Key**
  dialog box, click **Generate new key**. Make sure to copy the generated private
  key (in PEM format) to somewhere safe, and click **Save**.\n9. Under the **General
  Settings** section:\n   1. Next to the **Proof of possession** label, uncheck the
  **Require Demonstrating Proof of Possession (DPoP) header in token requests** option
  if it's selected.\n   2. Next to the **Grant type** label, make sure the **Client
  Credentials** option is selected, and that the **Token Exchange** option is not
  selected.\n   3. Click **Save**.\n10. Under the **Okta API Scopes** tab, grant the
  required scopes mentioned above for the app.\n11. Under the **Admin roles** tab:\n
  \   1. Click **Edit assignments**.\n    2. In the dropdown list under \"Role\",
  select **Super Administrator**.\n    3. Click **Save changes** at the top.\n\nFor
  more information, see the '[Implement OAuth for Okta](https://developer.okta.com/docs/guides/implement-oauth-for-okta/main/)'
  official documentation article.\n\n---\n[View Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/okta-v2)"
