detaileddescription: "### Community Contributed Integration\n #### Integration Author:
  Cortex XSOAR\n No support or maintenance is provided by the author. Customers are
  encouraged to engage with the user community for questions and guidance at the [Cortex
  XSOAR Live Discussions](https://live.paloaltonetworks.com/t5/cortex-xsoar-discussions/bd-p/Cortex_XSOAR_Discussions).\n***\n##
  Hello World v2\n\nThis section explains how to configure a **Hello World v2** integration
  instance in Cortex.\n\n> \U0001F4A1 **Integration Developer Tip**:\n>\n> This file,
  commonly referred to as the \"Help section\", appears on the right hand side of
  the integration instance configuration window.\n> Ensure you include step-by-step
  instructions to help users connect to the service API and configure an integration
  instance. \n> For example: Finding the Server URL, Obtaining Auth Credentials, Assigning
  required Auth Client scopes or permissions.\n\n## API Key\n\nUse `dummy-key` to
  simulate successful authentication. Otherwise, the **Test** button fails.\n\n\n---\n[View
  Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/hello-world-v2)"
