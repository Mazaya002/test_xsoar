description: Amazon Web Services CloudTrail.
detaileddescription: " Before you can use AWS CloudTrail, you need to perform several
  configuration steps in your AWS environment.\n\n### Prerequisites\n- Attach an instance
  profile with the required permissions to the Cortex XSOAR server or engine that
  is running \non your AWS environment.\n- Instance profile requires minimum permission:
  sts:AssumeRole.\n- Instance profile requires permission to assume the roles needed
  by the AWS integrations.\n\n### Configure AWS Settings\n- Create an IAM Role for
  the Instance Profile.\n- Attach a Role to the Instance Profile.\n- Configure the
  Necessary IAM Roles that the AWS Integration Can Assume.\n\nFor detailed instructions,
  see the [AWS Integrations - Authentication](https://xsoar.pan.dev/docs/reference/articles/aws-integrations---authentication).\n\n---\n[View
  Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/aws---cloud-trail)"
