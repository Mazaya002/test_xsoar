description: Run queries on Splunk and fetch Finding Events (Splunk ES 8.2+).
detaileddescription: "## SplunkPy v2\n\nUse the SplunkPy v2 integration to:\n\n- Fetch
  events (logs) from Splunk into Cortex\n- Push events from Cortex to Splunk\n- Fetch
  Splunk Enterprise Security events (Findings) into Cortex.\n***\n\n## Authentication
  Configuration\n\nThis integration uses **Splunk token-based authentication**.\n\n###
  How to Create a Splunk Authentication Token\n1. Log in to your Splunk instance as
  an administrator\n2. Navigate to **Settings** > **Tokens** (or **Settings** > **Users
  and Authentication** > **Tokens**)\n3. Click **New Token** or **Enable Token Authentication**
  (if not already enabled)\n4. Provide a name for the token and set an expiration
  time (optional)\n5. Click **Create** and copy the generated token immediately (it
  will only be shown once)\n6. Use this token value in the integration's **Splunk
  Token** field\n\nFor detailed instructions, refer to the official Splunk documentation:\n-
  [Create authentication tokens in Splunk Cloud](https://docs.splunk.com/Documentation/SplunkCloud/latest/Security/CreateAuthTokens)\n-
  [Create authentication tokens in Splunk Enterprise](https://docs.splunk.com/Documentation/Splunk/latest/Security/UseAuthTokens)\n\n\n\nThere
  are two main use cases for the SplunkPy v2 integration.\n- [Splunk Enterprise Security
  Users](https://xsoar.pan.dev/docs/reference/integrations/splunk-py#splunk-enterprise-security-users)\n
  \ - [Fetching finding events](https://xsoar.pan.dev/docs/reference/integrations/splunk-py#fetching-finding-events)\n
  \ - [Enriching Finding Events](https://xsoar.pan.dev/docs/reference/integrations/splunk-py#enriching-finding-events)\n
  \ - [Incident Mirroring](https://xsoar.pan.dev/docs/reference/integrations/splunk-py#incident-mirroring)\n-
  [Splunk non-Enterprise Security Users](https://xsoar.pan.dev/docs/reference/integrations/splunk-py#splunk-non-enterprise-security-users)\n
  \ - [Configure Splunk to Produce Alerts for SplunkPy v2 for non-ES Splunk Users](https://xsoar.pan.dev/docs/reference/integrations/splunk-py#configure-splunk-to-produce-alerts-for-splunkpy-for-non-es-splunk-users)\n
  \ - [Constraints](https://xsoar.pan.dev/docs/reference/integrations/splunk-py#constraints)\n\n***\n#
  Splunk Enterprise Security Users\n\n## Fetching finding events\nThe integration
  allows for fetching Splunk finding events using a default query. The query can be
  changed and modified to support different Splunk use cases.\nPalo Alto highly recommends
  reading the [Ingest Incidents from a SIEM Using Splunk article](https://docs-cortex.paloaltonetworks.com/r/Cortex-XSOAR/6.x/Cortex-XSOAR-Tutorials-6.x/Ingest-Incidents-from-a-SIEM-Using-Splunk)
  before starting to use this integration.\nThis article will help you configure your
  Splunk v2 integration, set up a basic flow, and start ingesting incidents from Splunk
  to Cortex XSOAR/XSIAM.\n\n### How to configure\n1. Navigate to one of the following:\n
  \   * Cortex XSOAR 8: Settings & Info > Settings > Integrations > Instances > SplunkPy
  v2\n    * Cortex XSOAR 6: Settings > Integrations > Servers & Services > SplunkPy
  v2.\n    * Cortex XSIAM: Settings > Configurations > Automation & Feed Integrations>
  SplunkPy v2```\n2. Click **Add Instance**.\n3. Type the **Server URL** and **Splunk
  Token**.\n4. Select **Fetches incidents**.\n5. Under Classifier, select N/A.\n6.
  Under Incident Type, select **Splunk Finding**.\nNote: You do not need to specify
  the classifier, as all Splunk incidents are ingested as Splunk Findings by default.
  As you become more familiar with Cortex XSOAR/XSIAM, you can create custom incident
  types as needed instead of using the Splunk Finding incident type.\n7. Under Mapper
  (incoming), select **Splunk Finding - Incoming Mapper**.\n8. Under Mapper (outgoing),
  select **Splunk Finding - Outgoing Mapper**.\n9. Keep the **Fetch events query**
  as is, as we use the \\`notable\\` macro when ingesting events. You can create a
  more granular search by specifying specific conditions such as specific security
  domain, event ID, etc.\n10. Keep the default values for fetch limit and first fetch
  timestamp.\n11. To enable mirroring in both environments, in the Incident Mirroring
  Direction field, select **Incoming and Outgoing**.\nOutgoing mirroring is recommended
  for Cortex XSOAR version 6.2 and above.\n12. Select *Close Mirrored XSOAR Incident*
  and *Close Mirrored Splunk Finding Event* so that closing an incident in one environment
  automatically closes it in the other.\n13. In the Enrichment Types field, select
  *Asset*, *Drilldown* and *Identity*.\nThis enrichment provides additional information
  about assets, drilldown, and identities that are related to the finding events you
  ingest. \nFor more information, see [Enriching Finding Events](#enriching-finding-events).\n14.
  Fetch backwards window - this backward window is for cases where there is a gap
  between the event occurrence time and the event index time on the Splunk server.\nIn
  Splunk, there is often a delay between the time an incident is created (the event's
  \"occurrence time\") and the time it is actually searchable in Splunk and visible
  in the index (the event's \"index time\").\nThis delay can be caused by an inefficient
  Splunk architecture, causing higher event indexing latency. However, it can also
  be \"by design\", e.g., if some endpoints or machines that generate Splunk events
  are frequently offline.\nAnother point to note is that Splunk's searches are based
  on the occurrence time behind the scenes. Meaning, Splunk itself uses occurrence
  time as its determining factor for bucket division and search.\nTherefore, we can't
  use index time as our primary search key without making the searches inefficient.\nThe
  backwards window is a way for you to configure the longest delay you would like
  to support.\nThis parameter determines the size of the occurrence time \"sliding
  window\" we will support in our queries. For example, if set for 2 hours, we will
  always search for events that occurred up to 2 hours ago (and will of course ignore
  duplicates).\nHowever, there is a trade-off: the larger the window, the longer fetch
  queries will take to complete.\nThe best value to set depends on the delays that
  you see in your system (consult with your Splunk expert / master), the number of
  events in your system, and other network properties.\nUse this parameter with careful
  consideration.\n15. Click **Test** and then **Save & exit**.\n\n**Note: If you are
  using a custom incident type, you also need to create custom corresponding incoming
  and outgoing mappers.**\n\n**Important: If you want to use the mirror mechanism,
  the incoming mapper must contain the following fields: dbotMirrorDirection, dbotMirrorId,
  dbotMirrorInstance**\n\n### Enriching Finding Events\nThis integration allows 3
  types of enrichments for fetched findings: Drilldown, Asset, and Identity.\n\n####
  Enrichment types\n1. **Drilldown search enrichment**: Fetches the drilldown searches
  configured by the user in the rule name that triggered the finding event and performs
  this search. The results are stored in the context of the incident under the **Drilldown**
  field as follows: [{'query_name':<query_name>, 'query_search': <query_search>, 'query_results':
  [{result1}, {result2}, {result3}], 'enrichment_status': <enrichment_status>}].\n2.
  **Asset search enrichment**: Runs the following query:\n*`| inputlookup append=T
  asset_lookup_by_str where asset=$ASSETS_VALUE | inputlookup append=t asset_lookup_by_cidr
  where asset=$ASSETS_VALUE | rename _key as asset_id | stats values(*) as * by asset_id`*\nwhere
  the **$ASSETS_VALUE** is replaced with the **src**, **dest**, **src_ip** and **dst_ip**
  from the fetched finding. The results are stored in the context of the incident
  under the **Asset** field.\n3. **Identity search enrichment**: Runs the following
  query\n*`| inputlookup identity_lookup_expanded where identity=$IDENTITY_VALUE`*\nwhere
  the **$IDENTITY_VALUE** is replaced with the **user** and **src_user** from the
  fetched finding event. The results are stored in the context of the incident under
  the **Identity** field.\n\n#### How to configure\n1. Configure the integration to
  fetch incidents (see the Integration documentation for details).\n2. *Enrichment
  Types*: Select the enrichment types you want to enrich each fetched finding with.
  If none are selected, the integration will fetch findings as usual (without enrichment).\n3.
  *Fetch finding events ES query*: The query for the finding events enrichment (defined
  by default). If you decide to edit this, make sure to provide a query that uses
  the \\`notable\\` macro. See the default query as an example.\n4. *Enrichment Timeout
  (Minutes)*:  The timeout for each enrichment (default is 5min). When the selected
  timeout was reached, finding events that were not enriched will be saved without
  the enrichment.\n5. *Number of Events Per Enrichment Type*: The maximal amount of
  events to fetch per enrichment type (Drilldown, Asset, and Identity). In a case
  of multiple drilldown enrichments the limit will apply for each drilldown search
  query. (default to 20).\n\n#### Troubleshooting enrichment status\nEach enriched
  incident contains the following fields in the incident context:\n- **successful_drilldown_enrichment**:
  whether the drilldown enrichment was successful. In a case of multiple drilldown
  enrichments, the status is successful if at least one drilldown search enrichment
  was successful.\n- **successful_asset_enrichment**: whether the asset enrichment
  was successful.\n- **successful_identity_enrichment**: whether the identity enrichment
  was successful.\n\n#### Resetting the enriching fetch mechanism\n- Click the ***Reset
  the \"last run\"*** button\n- Run the ***splunk-reset-enriching-fetch-mechanism***
  command and the mechanism will be reset to the initial configuration.\n\n#### Limitations\n-
  As the enrichment process is asynchronous, fetching enriched incidents takes longer.
  The integration was tested with 20+ notables simultaneously that were fetched and
  enriched after approximately ~4min.\n- If you wish to configure a mapper, wait for
  the integration to perform the first fetch successfully. This is to make the fetch
  mechanism logic stable.\n- The drilldown search does not support Splunk's advanced
  syntax. For example: Splunk filters (**|s**, **|h**, etc.)\n\n### Incident Mirroring\n**Important
  Notes**\n - This feature is available from Cortex XSOAR version 6.0.0.\n - This
  feature is supported by Splunk Enterprise Security only.\n - In order for the mirroring
  to work, the *Incident Mirroring Direction* parameter needs to be set before the
  incident is fetched.\n - In order to ensure the mirroring works as expected, mappers
  are required, both for incoming and outgoing, to map the expected fields in Cortex
  XSOAR and Splunk.\n - For mirroring the *owner* field, the usernames need to be
  transformed to the corresponding names in Cortex XSOAR and Splunk.\n\nYou can enable
  incident mirroring between Cortex XSOAR incidents and Splunk findings.\nTo set up
  mirroring:\n1. Navigate to __Settings__ > __Integrations__ > __Servers & Services__.\n2.
  Search for SplunkPy v2 and select your integration instance.\n3. Enable **Fetches
  incidents**.\n4. You can go to the *Fetch finding events ES enrichment query* parameter
  and select the query to fetch the findings from Splunk. Make sure to provide a query
  which uses the \\`notable\\` macro, See the default query as an example.\n5. In
  the *Incident Mirroring Direction* integration parameter, select the direction in
  which incidents should be mirrored:\n    - Incoming - Any changes in Splunk findings
  (finding's status, status_label, urgency, comments, and owner) will be reflected
  in Cortex XSOAR incidents.\n    - Outgoing - Any changes in Cortex XSOAR incidents
  (finding's status (not status_label), urgency, comments, and owner) will be reflected
  in Splunk findings.\n    - Incoming And Outgoing - Changes in Cortex XSOAR incidents
  and Splunk findings will be reflected in both directions.\n    - None - Turns off
  incident mirroring.\n6. Optional: Check the *Close Mirrored Cortex XSOAR Incidents
  (Incoming Mirroring)* integration parameter to close the Cortex XSOAR incident when
  the corresponding finding is closed on the Splunk side.\n   By default, only Findings
  closed with a \"Closed\" label will be mirrored. You can specify specific statuses
  (comma-separated) in the *Additional Splunk status labels to close on mirror (Incoming
  Mirroring)*, and enable the *Enable Splunk statuses marked as \"End Status\" to
  close on mirror (Incoming Mirroring)* option to add statuses marked as \"End Status\"
  in Splunk, and to add additional statuses to the mirroring process.\n7. Optional:
  Check the *Close Mirrored Splunk Finding Event* integration parameter to close the
  Splunk finding when the corresponding Cortex XSOAR incident is closed.\n**Note:
  This will not affect existing incidents.**\n\n\n# Splunk non-Enterprise Security
  Users\n\n### Configure Splunk to Produce Alerts for SplunkPy v2 for non-ES Splunk
  Users\n\nPalo Alto recommends that you configure Splunk to produce basic alerts
  that the SplunkPy v2 integration can ingest, by creating a summary index in which
  alerts are stored. The SplunkPy v2 integration can then query that index for incident
  ingestion. It is not recommended to use the Cortex XSOAR application with Splunk
  for routine event consumption because this method is not able to be monitored and
  is not scalable.\n\n1. Create a summary index in Splunk. For more information, click
  [here](https://docs.splunk.com/Documentation/Splunk/7.3.0/Indexer/Setupmultipleindexes#Create_events_indexes_2).\n2.
  Build a query to return relevant alerts.\n![image](https://storage.googleapis.com/marketplace-dist/content/packs/SplunkPy/integration_description_images/build-query.png)\n1.
  Identify the fields list from the Splunk query and save it to a local file.\n![image](https://storage.googleapis.com/marketplace-dist/content/packs/SplunkPy/integration_description_images/identify-fields-list.png)\n1.
  Define a search macro to capture the fields list that you saved locally. For more
  information, click [here](https://docs.splunk.com/Documentation/Splunk/7.3.0/Knowledge/Definesearchmacros).\nUse
  the following naming convention: (demisto_fields_{type}).\n![image](https://storage.googleapis.com/marketplace-dist/content/packs/SplunkPy/integration_description_images/micro-name.png)\n![image](https://storage.googleapis.com/marketplace-dist/content/packs/SplunkPy/integration_description_images/macro.png)\n1.
  Define a scheduled search, the results of which are stored in the summary index.
  For more information about scheduling searches, click [here](https://docs.splunk.com/Documentation/Splunk/7.3.0/Knowledge/Definesearchmacros).\n![image](https://storage.googleapis.com/marketplace-dist/content/packs/SplunkPy/integration_description_images/scheduled-search.png)\n1.
  In the Summary indexing section, select the summary index, and enter the {key:value}
  pair for Cortex XSOAR classification.\n![image](https://storage.googleapis.com/marketplace-dist/content/packs/SplunkPy/integration_description_images/summary-index.png)\n1.
  Configure the incident type in Cortex XSOAR by navigating to __Settings > Advanced
  > Incident Types.__ Note: In the example, Splunk Generic is a custom incident type.\n![image](https://storage.googleapis.com/marketplace-dist/content/packs/SplunkPy/integration_description_images/incident_type.png)\n1.
  Configure the classification. Make sure that your non ES incident fields are associated
  with your custom incident type.\n   1. Navigate to __Settings > Integrations > Classification
  & Mapping__.\n   2. Click your classifier.\n   3. Select your instance.\n   4. Click
  the fetched data.\n   5. Drag the value to the appropriate incident type.\n![image](https://storage.googleapis.com/marketplace-dist/content/packs/SplunkPy/integration_description_images/classify.png)\n1.
  Configure the mapping. Make sure to map your non ES fields accordingly and make
  sure that these incident fields are associated with their custom incident type.\n
  \  1. Navigate to __Settings > Integrations > Classification & Mapping__.\n   2.
  Click your mapper.\n   3. Select your instance.\n   4. Click the __Choose data path__
  link for the field you want to map.\n   5. Click the data from the Splunk fields
  to map it to Cortex XSOAR.\n![image](https://storage.googleapis.com/marketplace-dist/content/packs/SplunkPy/integration_description_images/mapping.png)\n1.
  \ (Optional) Create custom fields.\n2.  Build a playbook and assign it as the default
  for this incident type.\n\n### Constraints\nThe following features are not supported
  in non-ES (Enterprise Security) Splunk.\n- Incident Mirroring\n- Enrichment.\n-
  Content in the Splunk content pack (such as mappers, layout, playbooks, incident
  fields, and the incident type). Therefore, you will need to create your own content.
  See the [Cortex XSOAR Administrator’s Guide](https://docs-cortex.paloaltonetworks.com/p/XSOAR)
  for information.\n\n\n---\n[View Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/splunk-py-v2)"
