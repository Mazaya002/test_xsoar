commonfields:
  id: SplunkPy v2
  version: -1
configuration:
- additionalinfo: 'The Splunk server URL. Port 8089 (Splunk''s default REST API port)
    is used automatically. Only include the port in the URL if using a non-default
    port. Examples: ''https://splunk.example.com'' (uses default port 8089) or ''https://splunk.example.com:8090''
    (uses custom port 8090).'
  defaultvalue: https://splunk.example.com
  display: Server URL
  name: server_url
  required: true
  section: Connect
  type: 0
- display: ""
  displaypassword: Splunk Token
  hiddenusername: true
  name: authentication
  required: true
  section: Connect
  type: 9
- additionalinfo: The Splunk search query by which to fetch events. The default query
    fetches ES finding events. You can edit this query to fetch other types of events.
    Note, that to fetch ES finding events, make sure to include the \`notable\` macro
    in your query.
  defaultvalue: search `notable` | eval rule_name=if(isnull(rule_name),source,rule_name)
    | eval rule_title=if(isnull(rule_title),rule_name,rule_title) | `get_urgency`
    | `risk_correlation` | eval rule_description=if(isnull(rule_description),source,rule_description)
    | eval security_domain=if(isnull(security_domain),source,security_domain) | expandtoken
  display: Fetch events query
  name: fetchQuery
  required: false
  section: Collect
  type: 0
- defaultvalue: "50"
  display: Fetch Limit (Max.- 200, Recommended less than 50)
  name: max_fetch
  required: false
  section: Collect
  type: 0
- display: Fetch incidents
  name: isFetch
  required: false
  section: Collect
  type: 8
- display: Incident type
  name: incidentType
  required: false
  section: Collect
  type: 13
- additionalinfo: Whether to parse the raw part of the Findings, or not.
