description: "This playbook ensures a swift and effective response to malicious activities
  within Kubernetes environments, leveraging cloud-native tools to maintain cluster
  security and integrity.\n\nThe playbook is designed to handle agent-generated alerts
  due to malicious activities within Kubernetes (K8S) pods, such as mining activities,
  which require immediate action. The playbook also addresses scenarios where the
  malicious pod is killed, but the malicious K8S workload repeatedly creates new pods.\n\n###
  Key Features:\n\nAWS Function Integration: This utilizes an AWS Lambda function
  that can manage resources and facilitate rapid response actions within an Amazon
  EKS cluster without the need for third-party tools such as Kubectl.\n\nThe Lambda
  function can initiate the following response actions:\n\n    - Pod Termination:
  The playbook includes steps to safely terminate the affected pod within the K8S
  environment.\n    - Workload Suspension: If necessary, the playbook can be escalated
  to suspend the entire workload associated with the mining activity.\n\nOnce the
  Lambda function execution is completed, the playbook deletes all of the created
  objects to ensure undesirable usage.\n\n### Workflow:\n\n1. Alert Detection: The
  playbook begins with the monitoring agent detecting a mining alert within a Kubernetes
  pod.\n2. Alert Validation: Validates the alert to ensure it is not a false positive.\n3.
  Response Decision: \n    - Pod Termination: If the mining activity is isolated to
  a single pod, the AWS Lambda function is invoked to terminate the affected pod within
  the K8S environment.\n    - Workload Suspension: If the mining activity is widespread
  or poses a significant threat, the AWS Lambda function suspends the entire workload
  within the K8S environment.\n4. Cleanup: This action initiates the complete removal
  of all objects created for the Lambda execution for security and hardening purposes.\n\n###
  Required Integration\n\n#### AWS IAM (Identity and Access Management)\n- [AWS IAM
  API Documentation](https://docs.aws.amazon.com/IAM/latest/APIReference/Welcome.html)\n-
  [Cortex XSOAR AWS IAM Integration](https://cortex.marketplace.pan.dev/marketplace/details/AWSIAM/)\n\n####
  AWS EC2 (Elastic Compute Cloud)\n- [AWS EC2 API Documentation](https://docs.aws.amazon.com/AWSEC2/latest/APIReference/Welcome.html)\n-
  [Cortex XSOAR AWS EC2 Integration](https://cortex.marketplace.pan.dev/marketplace/details/AWSEC2/)\n\n####
  AWS EKS (Elastic Kubernetes Service)\n- [AWS EKS API Documentation](https://docs.aws.amazon.com/eks/latest/APIReference/Welcome.html)\n-
  [Cortex XSOAR AWS EKS Integration](https://cortex.marketplace.pan.dev/marketplace/details/AWSEKS/)\n\n####
  AWS Lambda\n- [AWS Lambda API Documentation](https://docs.aws.amazon.com/lambda/latest/dg/API_Reference.html)\n-
  [Cortex XSOAR AWS Lambda Integration](https://cortex.marketplace.pan.dev/marketplace/details/AWSLambda/)."
id: Cortex XDR - Malicious Pod Response - Agent
