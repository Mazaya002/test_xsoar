      FunctionArchitecture:
        simple: x86_64
      FunctionCode:
        simple: "import base64\nimport re\nimport boto3\nfrom botocore.signers import
          RequestSigner\nfrom kubernetes import client, config\n\n# Initialize EKS
          client\neks_client = boto3.client('eks')\ncore_v1_api = None\napps_v1_api
          = None\n\n# Initialize STS client\nSTS_TOKEN_EXPIRES_IN = 60\nsession =
          boto3.session.Session()\nsts = session.client('sts')\nservice_id = sts.meta.service_model.service_id\n\n\ndef
          get_cluster_info(cluster_name):\n    \"Retrieve cluster endpoint and certificate\"\n
          \   cluster_response = eks_client.describe_cluster(name=cluster_name)\n
          \   cluster_endpoint = cluster_response['cluster']['endpoint']\n    cluster_ca_data
          = cluster_response['cluster']['certificateAuthority']['data']\n    cluster_info
          = {\n        \"endpoint\" : cluster_endpoint,\n        \"ca\" : cluster_ca_data\n
          \   }\n    return cluster_info\n    \ndef get_bearer_token(cluster_name):\n
          \   \"Create authentication token\"\n    signer = RequestSigner(\n        service_id,\n
          \       session.region_name,\n        'sts',\n        \"v4\",\n        session.get_credentials(),\n
          \       session.events\n    )\n    \n    params = {\n        'method': 'GET',\n
          \       'url': 'https://sts.{}.amazonaws.com/?Action=GetCallerIdentity&Version=2011-06-15'.format(session.region_name),\n
          \       'body': {},\n        'headers': {\n            'x-k8s-aws-id': cluster_name\n
          \       },\n        'context': {}\n    }\n    \n    signed_url = signer.generate_presigned_url(\n
          \       params,\n        region_name=session.region_name,\n        expires_in=STS_TOKEN_EXPIRES_IN,\n
          \       operation_name=''\n    )\n    \n    base64_url = base64.urlsafe_b64encode(signed_url.encode('utf-8')).decode('utf-8')\n
          \   \n    # remove any base64 encoding padding:\n    return 'k8s-aws-v1.'
          + re.sub(r'=*', '', base64_url)\n\ndef get_workload_info(pod_name, pod_namespace):\n
          \   global core_v1_api\n    workload_type = None\n    workload_name = None\n
          \   pod_details = core_v1_api.read_namespaced_pod(pod_name, pod_namespace)\n
          \   \n    if isinstance(pod_details.metadata.owner_references, list):\n
          \       for owner in pod_details.metadata.owner_references:\n            if
          owner.controller == True:\n                workload_type = owner.kind\n
          \               workload_name = owner.name\n                # Is replicaset?\n
          \               if workload_type == 'ReplicaSet':\n                    replicaset
          = apps_v1_api.read_namespaced_replica_set(name=workload_name, namespace=pod_namespace)\n
          \                   # Is deployment?\n                    if isinstance(replicaset.metadata.owner_references,
          list):\n                        for owner in replicaset.metadata.owner_references:\n
          \                           if owner.controller == True:\n                                workload_type
          = owner.kind\n                                workload_name = owner.name\n
          \   \n    return workload_type, workload_name\n\ndef delete_pod(pod_namespace,
          pod_name):\n    global core_v1_api\n    core_v1_api.delete_namespaced_pod(pod_name,
          pod_namespace)\n    return\n\ndef delete_workload(workload_type, workload_name,
          workload_namespace):\n    global apps_v1_api\n    match workload_type:\n
          \       case \"ReplicaSet\":\n            replicaset = apps_v1_api.read_namespaced_replica_set(workload_name,
          workload_namespace)\n            body = {\"spec\":{\"replicas\":0}}\n            apps_v1_api.patch_namespaced_replica_set_scale(workload_name,
          workload_namespace, body)\n            return \"ReplicaSet Scale Updated\"\n
          \       case \"Deployment\":\n            deployment = apps_v1_api.read_namespaced_deployment(workload_name,
          workload_namespace)\n            body = {\"spec\":{\"replicas\":0}}\n            apps_v1_api.patch_namespaced_deployment_scale(workload_name,
          workload_namespace, body)\n            return \"Deployment Scale Updated\"\n
          \       case \"StatefulSet\":\n            statefulset = apps_v1_api.read_namespaced_stateful_set(workload_name,
          workload_namespace)\n            body = {\"spec\":{\"replicas\":0}}\n            apps_v1_api.patch_namespaced_stateful_set_scale(workload_name,
          workload_namespace, body)\n            return \"StatefulSet Scale Updated\"\n
          \       case \"DaemonSet\":\n            daemonset = apps_v1_api.read_namespaced_daemon_set(workload_name,
          workload_namespace)\n            body = {\"spec\":{\"template\":{\"spec\":{\"nodeSelector\":{\"non-existing\":\"true\"}}}}}\n
          \           apps_v1_api.patch_namespaced_daemon_set(workload_name, workload_namespace,
          body)\n            return \"DaemonSet Scale Updated\"\n        case _:\n
          \           return \"Could Not Identify Pod Type\"\n\ndef lambda_handler(event,
          context):\n    \n    cluster_name = event['cluster_name']\n    pod_name
          = event['pod_name']\n    pod_namespace = event['pod_namespace']\n    \n
          \   # Kubeconfig Configuration\n    cluster_info = get_cluster_info(cluster_name)\n
          \   token = get_bearer_token(cluster_name)\n    kubeconfig = {\n            'apiVersion':
          'v1',\n            'clusters': [{\n                'name': 'cluster1',\n
          \               'cluster': {\n                    'certificate-authority-data':
          cluster_info[\"ca\"],\n                    'server': cluster_info[\"endpoint\"]\n
          \               }\n            }],\n            'contexts': [{'name': 'context1',
          'context': {'cluster': 'cluster1', \"user\": \"user1\"}}],\n            'current-context':
          'context1',\n            'kind': 'config',\n            'preferences': {},\n
          \           'users': [{'name': 'user1', \"user\" : {'token': token}}]\n
          \       }\n    config.load_kube_config_from_dict(config_dict=kubeconfig)\n
          \   \n    # Kubernetes Client Configuration\n    global core_v1_api, apps_v1_api\n
          \   core_v1_api = client.CoreV1Api()\n    apps_v1_api = client.AppsV1Api()\n
          \   \n    # Extract Workload Information\n    workload_type, workload_name
          = get_workload_info(pod_name, pod_namespace)\n    \n    # Delete Pods\n
          \   if workload_type is None or workload_name is None:\n        delete_pod(pod_namespace,
          pod_name)\n        return \"Pod Deleted\"\n    else: \n        print(\"Workload
          Type: \" + workload_type)\n        print(\"Workload Name: \" + workload_name)\n
          \       delete_workload(workload_type, workload_name, pod_namespace)\n        return
          \"Workload Scale Updated\"\n        \n    return"
      FunctionHandler:
